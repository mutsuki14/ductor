# Simplified Chinese CLI strings (Rich-formatted, shown in terminal).

[status]
running = "[bold green]运行中[/bold green]  pid={pid}  运行时长：{uptime}"
not_running = "[dim]未运行[/dim]"
provider = "提供方：  [cyan]{provider}[/cyan]（{model}）"
docker_enabled = "Docker：   [green]已启用[/green]（{name}）"
docker_disabled = "Docker：   [dim]未启用[/dim]"
errors_found = "错误：      最新日志中有 [bold red]{count}[/bold red] 条"
errors_none = "错误：      [green]0[/green]"
paths_header = "[bold]路径：[/bold]"
not_configured = "[bold yellow]尚未配置。[/bold yellow]\n\n运行 [bold]ductor[/bold] 启动设置向导。"

[config]
incomplete = "[bold yellow]配置不完整。请运行 [bold]ductor onboarding[/bold]。[/bold yellow]"
matrix_no_homeserver = "[bold yellow]需要 Matrix homeserver URL。{hint}[/bold yellow]"
matrix_no_user = "[bold yellow]需要 Matrix user_id。{hint}[/bold yellow]"
matrix_no_auth = "[bold yellow]需要 Matrix password 或 access_token。{hint}[/bold yellow]"
matrix_no_target = "[bold yellow]至少需要一个 allowed_room 或 allowed_user。{hint}[/bold yellow]"
onboarding_hint = " 运行 [bold]ductor onboarding[/bold] 重新配置。"

[lifecycle]
stopping_docker = "[dim]正在停止 Docker 容器「{name}」...[/dim]"
docker_stopped = "[green]Docker 容器已停止。[/green]"
stopping_bot = "[dim]正在停止机器人（pid={pid}）...[/dim]"
bot_stopped = "[green]机器人已停止。[/green]"
killed_extra = "[dim]已终止 {count} 个残留 ductor 进程。[/dim]"
no_instance = "[dim]未找到正在运行的机器人实例。[/dim]"

[lifecycle.uninstall]
title = "[bold red]卸载 ductor[/bold red]"
body = """\
[bold red]这会从系统中永久移除 ductor。[/bold red]\n
  1. 停止正在运行的机器人（如有）
  2. 移除 Docker 容器和镜像（如使用）
  3. 删除 ~/.ductor/ 中的全部数据
  4. 卸载 ductor 软件包"""
confirm = "确定要卸载全部内容吗？"
cancelled = "[dim]已取消卸载。[/dim]"
removing_image = "[dim]正在移除 Docker 镜像「{image}」...[/dim]"
image_removed = "[green]Docker 镜像已移除。[/green]"
uninstalling = "[dim]正在卸载 ductor 软件包...[/dim]"
delete_warning = "[yellow]警告：未能完整删除 {home}（部分文件可能被占用）。请手动移除。[/yellow]"
deleted = "[green]已删除 {home}[/green]"
done_title = "[bold green]再见[/bold green]"
done_body = "[bold green]ductor 已完全移除。[/bold green]\n\n感谢使用 ductor！"

[lifecycle.upgrade]
dev_title = "[bold yellow]开发安装[/bold yellow]"
dev_body = """\
[bold yellow]当前从源码运行（editable install）。[/bold yellow]\n
自升级不可用。
请在项目目录中使用 [bold]git pull[/bold] 更新。"""
title = "[bold cyan]正在升级 ductor...[/bold cyan]"
body = """\
  1. 优雅停止正在运行的机器人
  2. 升级到最新版本
  3. 重启"""
upgrading = "[dim]正在升级软件包...[/dim]"
complete = "[green]升级完成：{old} -> {new}[/green]"
unchanged = "[bold yellow]升级后版本未变化（{version}）。[/bold yellow]\n已尝试自动重试，但尚未验证到新安装版本。"
restarting = "[dim]正在重启...[/dim]"

[docker]
config_not_found = "[bold red]未找到配置。请先运行 ductor。[/bold red]"
config_read_error = "[bold red]读取配置失败。[/bold red]"
enabled = "Docker 沙箱：[green]已启用[/green]"
disabled = "Docker 沙箱：[dim]未启用[/dim]"

[service]
not_installed = "[dim]服务未安装。运行 [bold]ductor service install[/bold]。[/dim]"
not_running = "[dim]服务未运行。[/dim]"
no_service = "[dim]未安装服务。[/dim]"
no_binary = "[bold red]无法在 PATH 中找到 ductor 可执行文件。[/bold red]"
removed = "[green]服务已移除。[/green]"
started = "[green]服务已启动。[/green]"
stopped = "[green]服务已停止。[/green]"
start_failed = "[red]启动失败：{error}[/red]"
stop_failed = "[red]停止失败：{error}[/red]"

[service.install]
title = "ductor 后台服务"
body = """\
[bold green]ductor 现在已作为后台服务运行。[/bold green]\n
{detail}\n
[bold]常用命令：[/bold]\n
  [cyan]ductor service status[/cyan]     查看运行状态
  [cyan]ductor service stop[/cyan]       停止服务
  [cyan]ductor service logs[/cyan]       {logs_hint}
  [cyan]ductor service uninstall[/cyan]  移除服务"""

[service.linux]
no_systemd = "[bold red]未找到 systemd。服务安装需要带 systemd 的 Linux。[/bold red]"
linger_warning = "[bold yellow]需要启用 linger，ductor 才能在你退出登录后继续运行。[/bold yellow]"
linger_enabled = "[green]linger 已启用。[/green]"
linger_manual = "[yellow]未能自动启用 linger。[/yellow]\n请手动运行：[bold]sudo loginctl enable-linger {user}[/bold]"

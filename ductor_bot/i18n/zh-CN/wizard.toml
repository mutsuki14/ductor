# Simplified Chinese wizard strings (Rich-formatted, shown in terminal during onboarding).

[common]
cancelled = "[dim]已取消设置。[/dim]"
subtitle = "ductor.dev"

[cli_backends]
title = "CLI 后端"
header = "[bold]检测到的 AI 后端：[/bold]\n"
claude = "  Claude Code CLI   {status}"
codex = "  OpenAI Codex CLI  {status}"
gemini = "  Google Gemini CLI {status}"
no_auth = """\
\n[bold red]至少需要安装并登录一个 CLI。[/bold red]\n
  Claude: [dim]https://docs.anthropic.com/en/docs/claude-code[/dim]
  Codex:  [dim]https://github.com/openai/codex[/dim]
  Gemini: [dim]https://github.com/google-gemini/gemini-cli[/dim]"""
claude_check_failed = "[yellow]Claude 登录状态检查出错：{error}。已跳过。[/yellow]"
codex_check_failed = "[yellow]Codex 登录状态检查出错：{error}。已跳过。[/yellow]"
gemini_check_failed = "[yellow]Gemini 登录状态检查出错：{error}。已跳过。[/yellow]"

[disclaimer]
title = "[bold yellow]免责声明[/bold yellow]"
body = """\
[bold]重要提示，请在继续前阅读。[/bold]\n
ductor 会把 [bold]Anthropic Claude CLI[/bold] 和 \
[bold]OpenAI Codex CLI[/bold] 作为 AI 智能体后端连接起来。\n
机器人会以 [bold yellow]完整权限绕过模式[/bold yellow] 运行。\
智能体可以读取、写入和删除文件，执行命令，\
并在无需再次确认的情况下与系统交互。\n
虽然项目内置了一些防护，[bold red]仍可能发生非预期操作[/bold red]，\
包括数据丢失、意外文件变更或意外命令执行。\n
[bold green]强烈建议在 Docker 容器中运行 ductor[/bold green]，\
以便与宿主系统隔离。"""
confirm = "我理解这些风险，并希望继续。"

[transport]
title = "[bold]消息传输方式[/bold]"
body = """\
[bold]选择用户和机器人对话的方式：[/bold]\n
  [bold cyan]Telegram[/bold cyan]  — 需要从 @BotFather 获取机器人 Token
  [bold cyan]Matrix[/bold cyan]    — 需要一个 Matrix 服务器账号（例如 Element）"""
prompt = "选择传输方式："

[telegram.token]
title = "[bold]Telegram 机器人 Token[/bold]"
body = """\
[bold]如何获取 Telegram Bot Token：[/bold]\n
  1. 打开 Telegram，搜索 [bold cyan]@BotFather[/bold cyan]
  2. 发送 [bold]/newbot[/bold] 并按提示操作
  3. 为机器人选择名称和用户名
  4. BotFather 会回复你的机器人 Token\n
[dim]Token 格式：1234567890:ABCdefGHIjklMNOpqrsTUVwxyz[/dim]"""
prompt = "粘贴你的机器人 Token："
error = "[red]Token 格式无效。期望格式：数字:字母数字串（例如 123456:ABC-xyz）[/red]"

[telegram.user_id]
title = "[bold]Telegram 用户 ID[/bold]"
body = """\
[bold]如何查找你的 Telegram 用户 ID：[/bold]\n
  1. 打开 Telegram，搜索 [bold cyan]@userinfobot[/bold cyan]
  2. 向机器人发送 [bold]/start[/bold]
  3. 它会回复你的数字用户 ID\n
[dim]机器人只会接受来自这个用户 ID 的消息。[/dim]"""
prompt = "输入你的数字用户 ID："
error_nan = "[red]请输入有效数字。[/red]"
error_negative = "[red]用户 ID 必须是正数。[/red]"

[matrix.homeserver]
title = "[bold]Matrix 服务器[/bold]"
body = """\
[bold]输入你的 Matrix homeserver URL。[/bold]\n
  也就是机器人账号所在的服务器。\n
[dim]示例：https://matrix.example.com[/dim]"""
prompt = "Homeserver URL："
error = "[red]必须是 HTTPS URL（例如 https://matrix.example.com）[/red]"

[matrix.user_id]
title = "[bold]Matrix 机器人用户 ID[/bold]"
body = """\
[bold]输入机器人的 Matrix 用户 ID。[/bold]\n
  请在你的 homeserver 上为机器人创建专用账号。\n
[dim]格式：@botname:homeserver.domain[/dim]"""
prompt = "机器人用户 ID："
error = "[red]格式无效。期望格式：@localpart:domain（例如 @mybot:matrix.org）[/red]"

[matrix.password]
title = "[bold]Matrix 密码[/bold]"
body = """\
[bold]输入机器人账号密码。[/bold]\n
  仅用于首次登录。首次登录后会保存 access token，
  后续不再需要密码。"""
prompt = "密码："
error = "[red]密码不能为空。[/red]"

[matrix.allowed_users]
title = "[bold]允许的用户[/bold]"
body = """\
[bold]哪些用户可以和这个机器人对话？[/bold]\n
  输入你的 Matrix 用户 ID。只有允许列表中的用户
  才会被处理。\n
[dim]格式：@username:homeserver.domain[/dim]"""
prompt = "你的 Matrix 用户 ID："
error = "[red]格式无效。期望格式：@user:domain（例如 @nik:matrix.org）[/red]"

[docker]
title = "[bold]Docker 沙箱[/bold]"
found_body = """\
[bold green]已在系统中检测到 Docker。[/bold green]\n
在 Docker 中运行 ductor 可以与宿主机隔离。
这是更安全的推荐设置。"""
found_prompt = "启用 Docker 沙箱？（推荐）"
not_found_body = """\
[bold yellow]系统中未找到 Docker。[/bold yellow]\n
建议安装 Docker，以便在隔离容器中运行机器人。
你也可以稍后在配置中启用 Docker 沙箱。\n
[dim]https://docs.docker.com/get-docker/[/dim]"""

[docker.extras]
title = "[bold]可用 Docker 扩展[/bold]"
col_package = "软件包"
col_description = "用途"
col_size = "大小"
prompt = "选择扩展（空格切换，回车确认）："
hint = """\
[dim]这些软件包是可选项，会增加镜像构建时间。
之后也可以用 [cyan]ductor docker extras-add / extras-remove[/cyan] 修改。[/dim]"""
auto_deps = "[dim]已自动加入依赖：{names}[/dim]"

[timezone]
title = "[bold]时区[/bold]"
body = """\
你的时区会用于定时任务、心跳免打扰时间
和每日会话重置。"""
prompt = "选择你的时区："
manual_prompt = "输入 IANA 时区（例如 Asia/Shanghai）："
error = "[red]未知时区：{tz}[/red]"

[service]
title = "[bold]后台服务[/bold]"
body = """\
[bold]是否把 ductor 作为后台服务运行？[/bold]\n
这会创建一个 {mechanism}，用于：\n
  - 在 {trigger} 时启动 ductor
  - 崩溃后自动重启
  - 保持后台运行\n
[dim]推荐用于 VPS 或需要长期在线的环境。[/dim]"""
prompt = "安装为后台服务？（推荐用于 VPS）"

[complete]
title = "[bold green]已就绪[/bold green]"
header = "[bold green]设置完成！[/bold green]"
files_header = "[bold]你的 ductor 文件：[/bold]"
home = "  主目录：     [cyan]{path}[/cyan]"
config = "  配置：       [cyan]{path}[/cyan]"
workspace = "  工作区：     [cyan]{path}[/cyan]"
logs = "  日志：       [cyan]{path}[/cyan]"
installing_service = "正在安装服务..."
starting_bot = "正在启动机器人..."

[reset]
title = "[bold yellow]检测到现有设置[/bold yellow]"
body = """\
[bold yellow]你已经完成过配置。[/bold yellow]\n
重新运行引导流程会执行 [bold red]完整重置[/bold red]：\n
  [dim]{home}[/dim] 会被全部删除。
  所有会话、配置、记忆和定时任务都会丢失。"""

[reset.docker]
title = "[bold]Docker 清理[/bold]"
body = """\
[bold]当前配置已启用 Docker 沙箱。[/bold]\n
  容器： [cyan]{container}[/cyan]
  镜像： [cyan]{image}[/cyan]"""
prompt = "删除 Docker 容器和镜像？"
removing = "[dim]正在删除 Docker 资源...[/dim]"
done = "[green]Docker 清理完成。[/green]"

[reset.confirm]
prompt = "删除全部内容并重新开始？"
deleted = "[dim]工作区已删除。[/dim]"
warning = "[yellow]警告：未能完整删除 {home}。请手动移除。[/yellow]"

[language]
prompt = "选择语言 / Select language："
